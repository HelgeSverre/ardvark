version: 2

project_name: ardvark

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/ardvark
    binary: ardvark
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

# Raw per-platform binaries (no tar.gz/zip) rather than goreleaser's `brews`
# formula generation: 2.16+ hard-deprecated `brews` in favour of macOS-only
# `homebrew_casks`, which would drop Linux `brew install` support. Publishing
# uncompressed binaries named ardvark-{os}-{arch} keeps the release/.github
# workflow's Homebrew-formula step trivial: it downloads the exact asset,
# sha256s it, and points the formula's `url` straight at it — no archive to
# unpack. See .github/workflows/release.yml's `homebrew` job.
archives:
  - formats: [binary]
    name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: helgesverre
    name: ardvark
  draft: false
